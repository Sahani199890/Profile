<!doctype html><html><head><link rel="stylesheet" href="styles.css"></head>
<body>
<div data-reveal>x</div>
<pre id="o"></pre>
<script src="animations.js"></script>
<script>
  var o=[];
  o.push('reduce='+window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  o.push('pointerFine='+window.matchMedia('(pointer: fine)').matches);
  o.push('bodyLoadedClass='+document.body.classList.contains('loaded'));
  var sheets=[].slice.call(document.styleSheets).map(function(s){return (s.href||'inline')+':'+(s.cssRules?s.cssRules.length+'rules':'BLOCKED')});
  o.push('stylesheets='+sheets.join(' | '));
  document.getElementById('o').setAttribute('data-result', o.join(' ;; '));
  document.body.classList.add('DIAGRAN');
</script>
</body></html>
